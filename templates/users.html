<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>کاربران</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">👥 کاربران</h1>
            <a href="/dashboard" class="bg-gray-500 text-white px-4 py-2 rounded">بازگشت</a>
        </div>
        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3">ID</th>
                        <th class="p-3">Telegram ID</th>
                        <th class="p-3">Username</th>
                        <th class="p-3">نام</th>
                        <th class="p-3">وضعیت</th>
                        <th class="p-3">تاریخ عضویت</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in users %}
                    <tr class="border-t">
                        <td class="p-3">{{ u[0] }}</td>
                        <td class="p-3">{{ u[1] }}</td>
                        <td class="p-3">{{ u[2] or '-' }}</td>
                        <td class="p-3">{{ u[3] or '-' }}</td>
                        <td class="p-3">{{ '🔴' if u[4] else '🟢' }}</td>
                        <td class="p-3">{{ u[5][:10] if u[5] else '-' }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
