<!DOCTYPE html>
<html dir="rtl" lang="fa">
<head>
    <meta charset="UTF-8">
    <title>اکانت‌ها</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="container mx-auto p-6">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-3xl font-bold">📦 اکانت‌ها</h1>
            <a href="/dashboard" class="bg-gray-500 text-white px-4 py-2 rounded">بازگشت</a>
        </div>
        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full">
                <thead class="bg-gray-100">
                    <tr>
                        <th class="p-3">ID</th>
                        <th class="p-3">Username</th>
                        <th class="p-3">Password</th>
                        <th class="p-3">پلن</th>
                        <th class="p-3">وضعیت</th>
                    </tr>
                </thead>
                <tbody>
                    {% for a in accounts %}
                    <tr class="border-t">
                        <td class="p-3">{{ a[0] }}</td>
                        <td class="p-3">{{ a[1] }}</td>
                        <td class="p-3">{{ a[2] }}</td>
                        <td class="p-3">{{ a[9] if a[9] else '-' }}</td>
                        <td class="p-3">{{ a[4] }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
